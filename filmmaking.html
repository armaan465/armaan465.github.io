<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filmmaking — Armaan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #111008; --off: #1e1a10; --ink: #eee8e0;
      --mid: #908070; --light: #302818; --accent: #b85030; --accent-light: #281408;
    }
    body { background: #090806; color: #eee8e0; font-family: 'Josefin Sans', sans-serif; font-weight: 400; min-height: 100vh; overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 2.5rem 4rem;
    }
    .nav-links { display: flex; gap: 3rem; list-style: none; }
    .nav-links a {
      font-size: 0.68rem; font-weight: 400; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none;
      color: rgba(253,252,250,0.35); transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }

    /* COMING SOON */
    .coming-soon {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background texture */
    .bg-abstract {
      position: absolute; inset: 0; pointer-events: none;
    }
    .bg-abstract svg { width: 100%; height: 100%; }
    .ba1 { animation: driftA 18s ease-in-out infinite; }
    .ba2 { animation: driftB 24s ease-in-out infinite 3s; }
    .ba3 { animation: driftA 20s ease-in-out infinite 6s; }

    @keyframes driftA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(18px,-22px); } }
    @keyframes driftB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-14px,18px); } }

    .cs-eyebrow {
      font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 1s ease 0.3s forwards;
    }

    .cs-title {
      font-family: 'Playfair Display', serif; font-weight: 400;
      font-size: clamp(4rem, 9vw, 9rem); line-height: 1; letter-spacing: 0.04em;
      opacity: 0; animation: fadeUp 1s ease 0.5s forwards;
    }
    .cs-title em { font-style: italic; color: var(--accent); }

    .cs-rule {
      width: 0; height: 1px; background: var(--accent); margin: 2.5rem auto;
      animation: expandLine 1s ease 0.9s forwards;
    }

    .cs-text {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 1.3rem; font-weight: 400;
      color: rgba(253,252,250,0.5); line-height: 1.7; max-width: 440px;
      opacity: 0; animation: fadeUp 1s ease 1.1s forwards;
    }

    .cs-back {
      margin-top: 4rem;
      font-size: 0.63rem; font-weight: 400; letter-spacing: 0.2em;
      text-transform: uppercase; text-decoration: none;
      color: rgba(253,252,250,0.35); display: inline-flex; align-items: center; gap: 0.6rem;
      transition: color 0.3s, gap 0.3s;
      opacity: 0; animation: fadeUp 1s ease 1.3s forwards;
    }
    .cs-back::before { content: '←'; }
    .cs-back:hover { color: var(--white); gap: 1rem; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes expandLine { from { width: 0; } to { width: 48px; } }

    @media (max-width: 580px) {
      nav { padding: 1.5rem 2rem; }
      .nav-links { gap: 1.5rem; }
      .coming-soon { padding: 2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <ul class="nav-links">
      <li><a href="index.html">About</a></li>
      <li><a href="writing.html">Writing</a></li>
      <li><a href="photography.html">Photography</a></li>
      <li><a href="filmmaking.html" class="active">Filmmaking</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="coming-soon">
    <div class="bg-abstract">
      <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="bf1"><feGaussianBlur stdDeviation="50"/></filter>
          <filter id="bf2"><feGaussianBlur stdDeviation="30"/></filter>
        </defs>
        <ellipse cx="900" cy="200" rx="300" ry="280" fill="#b85030" opacity="0.06" filter="url(#bf1)" class="ba1"/>
        <ellipse cx="200" cy="600" rx="250" ry="220" fill="#b85030" opacity="0.05" filter="url(#bf1)" class="ba2"/>
        <ellipse cx="600" cy="400" rx="180" ry="180" fill="#8098a8" opacity="0.04" filter="url(#bf2)" class="ba3"/>
        <!-- Fine outline -->
        <ellipse cx="600" cy="400" rx="400" ry="320" fill="none" stroke="rgba(184,147,106,0.06)" stroke-width="1" class="ba1"/>
      </svg>
    </div>

    <p class="cs-eyebrow">Coming Soon</p>
    <h1 class="cs-title">Film<em>making</em></h1>
    <div class="cs-rule"></div>
    <p class="cs-text">Something is in the works. This space will soon hold films, short documentaries, and moving image work.</p>
    <a href="index.html" class="cs-back">Back to Home</a>
  </div>

</body>
</html>
